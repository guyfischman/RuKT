// Internal on-disk layout of prefix-tree nodes, not part of the gRPC API. The
// wire form of prefix-tree proofs is transparency.PrefixProof (§12.2).
syntax = "proto3";
package prefix_tree;

message ParentNode {
    bytes hash = 1;
    optional uint64 ptr = 2;
    optional uint64 firstUpdatePosition = 3;
}

message LeafNode {
    uint32 ctr = 1;
    bytes commitment = 2;
}

message LogEntry {
    bytes index = 1;
    repeated ParentNode copath = 2;
    uint64 firstUpdatePosition = 3;
    optional LeafNode leaf = 4;
    bytes precomputed32 = 6;
}
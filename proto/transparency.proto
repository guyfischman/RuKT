// Start proto/transparency.proto
syntax = "proto3";
package transparency;

// --- Draft-03 Section 11.2 Prefix Tree Proofs ---

message PrefixLeaf {
    bytes vrf_output = 1;
    bytes commitment = 2;
}

message PrefixSearchResult {
    // 1=inclusion, 2=nonInclusionLeaf, 3=nonInclusionParent
    uint32 result_type = 1; 
    optional PrefixLeaf leaf = 2;
    uint32 depth = 3;
}

message PrefixProof {
    repeated PrefixSearchResult results = 1;
    repeated bytes elements = 2;
}

// --- Draft-03 Section 11.1 Log Tree Proofs ---

message InclusionProof {
    repeated bytes elements = 1;
}

// --- Draft-03 Section 11.3 Combined Tree Proof ---

message CombinedTreeProof {
    repeated uint64 timestamps = 1;
    repeated PrefixProof prefix_proofs = 2;
    repeated bytes prefix_roots = 3;
    InclusionProof inclusion = 4;
}

// --- Draft-03 Section 12.1 User Operations ---

message BinaryLadderStep {
    bytes proof = 1; // VRF proof
    optional bytes commitment = 2;
}

message AuditorTreeHead {
  uint64 tree_size = 1;
  int64 timestamp = 2;
  bytes signature = 3;
}

message TreeHead {
    uint64 tree_size = 1;
    int64 timestamp = 2;
    repeated Signature signatures = 3;
}

message Signature {
  bytes auditor_public_key = 1;
  bytes signature = 2;
}

// Section 11.4
enum FullTreeHeadType {
    FULL_TREE_HEAD_TYPE_RESERVED = 0;
    FULL_TREE_HEAD_TYPE_SAME = 1;
    FULL_TREE_HEAD_TYPE_UPDATED = 2;
}

// Section 11.4
message FullTreeHead {
    FullTreeHeadType head_type = 1;
    optional TreeHead tree_head = 2;
    optional AuditorTreeHead auditor_tree_head = 3;
}

message UpdateValue {
    bytes value = 1;
}

message Consistency {
    optional uint64 last = 1;
    optional uint64 distinguished = 2;
}

// Section 13.1
message SearchRequest {
    optional uint64 last = 1;
    bytes label = 2;
    optional uint32 version = 3;
}

// Section 13.1
message SearchResponse {
    FullTreeHead full_tree_head = 1;
    optional uint32 version = 2;
    bytes opening = 3;
    UpdateValue value = 4;
    repeated BinaryLadderStep binary_ladder = 5;
    CombinedTreeProof search = 6;
}

// Section 13.5
message LabelValue {
    bytes value = 1;
}

// Section 13.5
message UpdateRequest {
    optional uint64 last = 1;
    bytes label = 2;
    optional uint32 greatest_version = 3;
    repeated LabelValue values = 4;
}

// Section 13.5
message UpdateInfo {
    bytes opening = 1;
    optional bytes suffix_signature = 2;
}

// Section 13.5
message UpdateResponse {
    FullTreeHead full_tree_head = 1;
    uint64 position = 2;
    repeated LabelValue values = 3;
    repeated UpdateInfo info = 4;
    repeated BinaryLadderStep binary_ladder = 5;
    CombinedTreeProof update = 6;
}

// Section 13.2
message MonitorMapEntry {
    uint64 position = 1;
    uint32 version = 2;
}

// Section 13.2
message ContactMonitorRequest {
    optional uint64 last = 1;
    bytes label = 2;
    repeated MonitorMapEntry entries = 3;
}

// Section 13.2
message ContactMonitorResponse {
    FullTreeHead full_tree_head = 1;
    CombinedTreeProof monitor = 2;
}

// Section 13.3
message OwnerInitRequest {
    optional uint64 last = 1;
    bytes label = 2;
    uint64 start = 3;
}

// Section 13.3
message OwnerInitResponse {
    FullTreeHead full_tree_head = 1;
    repeated uint32 greatest_versions = 2;
    repeated BinaryLadderStep binary_ladder = 3;
    CombinedTreeProof init = 4;
}

// Section 13.4
message OwnerMonitorRequest {
    optional uint64 last = 1;
    bytes label = 2;
    repeated MonitorMapEntry entries = 3;
    uint64 start = 4;
    optional uint32 greatest_version = 5;
}

// Section 13.4
message OwnerMonitorResponse {
    FullTreeHead full_tree_head = 1;
    CombinedTreeProof monitor = 2;
    // Carries the VRF proofs and commitments the §8.3 search ladders need for
    // their non-inclusion boundary versions (as OwnerInitResponse does).
    repeated BinaryLadderStep binary_ladder = 3;
}

// Section 13.6
message DistinguishedRequest {
    optional uint64 last = 1;
    optional uint64 stop = 2;
}

// Section 13.6
message DistinguishedResponse {
    FullTreeHead full_tree_head = 1;
    CombinedTreeProof distinguished = 2;
}

enum CredentialType {
    CREDENTIAL_TYPE_RESERVED = 0;
    CREDENTIAL_TYPE_STANDARD = 1;
    CREDENTIAL_TYPE_PROVISIONAL = 2;
}

// Section 14
message Credential {
    bytes label = 1;
    uint32 version = 2;
    bytes opening = 3;
    UpdateValue value = 4;
    repeated BinaryLadderStep binary_ladder = 5;
    uint64 position = 6;
    CredentialType credential_type = 7;
    // standard
    optional PrefixProof distinguished = 8;
    // provisional
    optional TreeHead tree_head = 9;
    optional CombinedTreeProof search = 10;
}

// Section 14.2
message CredentialUpdate {
    uint64 position = 1;
    CombinedTreeProof monitor = 2;
}

message GetCredentialRequest {
    bytes label = 1;
}

// Section 14.2
message GetCredentialUpdateRequest {
    bytes label = 1;
    uint64 terminal_position = 2;
    uint32 terminal_version = 3;
}

// --- Draft-03 Section 13.2 Auditing ---

message AuditorUpdate {
    uint64 timestamp = 1;
    repeated PrefixLeaf added = 2;
    repeated PrefixLeaf removed = 3;
    PrefixProof proof = 4;
}
// End proto/transparency.proto